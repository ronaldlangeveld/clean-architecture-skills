name: Validate Skills

on:
  push:
    paths:
      - 'skills/**/SKILL.md'
      - 'validate-skills.sh'
  pull_request:
    paths:
      - 'skills/**/SKILL.md'
      - 'validate-skills.sh'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validation
        run: |
          chmod +x ./validate-skills.sh
          ./validate-skills.sh
